<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}defex — replaces QC inspectors with AI{% endblock %}</title>
    <meta name="description" content="defex replaces QC inspectors with AI vision. Sub-$2K to deploy. Built for the bottom 90% of factories.">
    <link rel="canonical" href="https://defex.app/">

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="defex">
    <meta property="og:title" content="defex — replaces QC inspectors with AI">
    <meta property="og:description" content="Sub-$2K to deploy. Built for the bottom 90% of factories that Cognex and Keyence skip.">
    <meta property="og:url" content="https://defex.app/">
    <meta property="og:image" content="https://defex.app{% static 'img/og.png' %}">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="defex — replaces QC inspectors with AI">
    <meta name="twitter:description" content="Sub-$2K to deploy. Built for the bottom 90% of factories that Cognex and Keyence skip.">
    <meta name="twitter:image" content="https://defex.app{% static 'img/og.png' %}">

    <!-- Favicons (SVG for modern browsers, PNG fallback, Apple touch) -->
    <link rel="icon" type="image/svg+xml" href="{% static 'img/defex-mark.svg' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'img/favicon-32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'img/favicon-16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'img/apple-touch-icon.png' %}">

    <!-- Structured data (Organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "defex",
      "alternateName": "Defex",
      "url": "https://defex.app",
      "logo": "https://defex.app{% static 'img/og.png' %}",
      "description": "defex replaces QC inspectors with AI vision. Sub-$2K to deploy. Built for the bottom 90% of factories that Cognex and Keyence skip.",
      "foundingDate": "2026",
      "founder": [
        {"@type": "Person", "name": "Husan Mavlonov"},
        {"@type": "Person", "name": "Hasan Mavlonov"}
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Shanghai",
        "addressCountry": "CN"
      },
      "email": "hello@buildcored.com",
      "industry": "Industrial AI / Computer Vision"
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=EB+Garamond:ital,wght@1,400;1,500;1,600&family=Noto+Sans+SC:wght@400;500;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/landing.css' %}">

    <!-- Critical intro styles (load before main CSS to avoid flash) -->
    <style>
        body.is-loading { overflow: hidden; }
        .intro {
            position: fixed; inset: 0;
            background: #EFEBE4;
            z-index: 200;
            display: flex; align-items: center; justify-content: center;
            opacity: 1; visibility: visible;
            transition: opacity .45s ease, visibility 0s linear .45s;
        }
        .intro.is-done { opacity: 0; visibility: hidden; }
        .intro__mark { width: 56px; height: 180px; }
        @media (prefers-reduced-motion: reduce) {
            .intro { display: none; }
        }
    </style>

    <!-- Language boot — set html[lang] before paint to avoid flash -->
    <script>
        (function () {
            try {
                var saved = localStorage.getItem('defex.lang');
                var lang = saved || ((navigator.language || 'en').toLowerCase().indexOf('zh') === 0 ? 'zh' : 'en');
                document.documentElement.setAttribute('lang', lang);
            } catch (e) {}
        })();
    </script>
</head>
<body class="is-loading">

    <!-- Intro overlay — three-dot pulse, ~2s -->
    <div class="intro" id="intro" aria-hidden="true">
        <svg class="intro__mark" viewBox="0 0 20 64" xmlns="http://www.w3.org/2000/svg">
            <circle class="intro__dot intro__dot--1" cx="10" cy="10" r="7" fill="#0F1115"/>
            <circle class="intro__dot intro__dot--2" cx="10" cy="32" r="7" fill="#FF5A1F"/>
            <circle class="intro__dot intro__dot--3" cx="10" cy="54" r="7" fill="#0F1115"/>
        </svg>
    </div>

    {% block content %}{% endblock %}
    <script src="{% static 'js/landing.js' %}"></script>
</body>
</html>
