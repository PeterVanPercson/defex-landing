<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>404 — defex</title>
<style>
  html,body{margin:0;height:100%}
  body{
    background:#EFEBE4;color:#0F1115;
    font-family:ui-monospace,Menlo,monospace;
    display:flex;align-items:center;justify-content:center;text-align:center;
    background-image:linear-gradient(rgba(15,17,21,.055) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(15,17,21,.055) 1px,transparent 1px);
    background-size:32px 32px;
  }
  .wrap{max-width:420px;padding:24px}
  .mark{display:flex;gap:7px;justify-content:center;margin-bottom:28px}
  .mark i{width:13px;height:13px;border-radius:50%;background:#0F1115;display:block}
  .mark i:nth-child(2){background:#FF5A1F}
  h1{font-size:64px;margin:0;letter-spacing:-.03em}
  p{color:#7A7B7F;font-size:13px;margin:14px 0 28px}
  a{color:#FF5A1F;text-decoration:none;border-bottom:1px solid #FF5A1F;padding-bottom:1px;font-size:13px}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark"><i></i><i></i><i></i></div>
    <h1>404</h1>
    <p>that line isn't on the floor.</p>
    <a href="/">&larr; back to defex.app</a>
  </div>
</body>
</html>
