name: smoke

# Catches the class of breakage this project keeps hitting: a
# nonexistent dependency, an import error, a broken template, a route
# regression, or a 500 on a main page — before it reaches production.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Django system check
        run: python manage.py check

      - name: collectstatic
        run: python manage.py collectstatic --no-input

      - name: Boot server + hit the real routes
        run: |
          python manage.py runserver 8000 >/tmp/srv.log 2>&1 &
          for i in $(seq 1 20); do
            curl -sf -o /dev/null http://127.0.0.1:8000/ && break
            sleep 1
          done
          code_home=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/)
          code_pricing=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8000/pricing/)
          echo "home=$code_home pricing=$code_pricing"
          test "$code_home" = "200"
          test "$code_pricing" = "200"
