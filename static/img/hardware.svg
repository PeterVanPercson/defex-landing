<svg viewBox="0 0 720 280" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="defex hardware schematic: camera, conveyor belt, and edge box">

  <!-- CAMERA -->
  <!-- camera body -->
  <rect x="180" y="48" width="80" height="42" fill="#EFEBE4" stroke="#0F1115" stroke-width="1.5"/>
  <!-- camera lens -->
  <circle cx="275" cy="69" r="14" fill="#EFEBE4" stroke="#0F1115" stroke-width="1.5"/>
  <circle cx="275" cy="69" r="5" fill="#0F1115"/>
  <!-- mount arm -->
  <polyline points="200,48 200,22 252,22" fill="none" stroke="#0F1115" stroke-width="1.5"/>
  <!-- record indicator -->
  <circle cx="252" cy="58" r="2.5" fill="#FF5A1F"/>
  <!-- camera label -->
  <text x="180" y="40" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#0F1115">camera · 30 fps</text>

  <!-- Field-of-view cone (dashed orange) -->
  <line x1="270" y1="84" x2="220" y2="172" stroke="#FF5A1F" stroke-width="1" stroke-dasharray="2 3"/>
  <line x1="280" y1="84" x2="330" y2="172" stroke="#FF5A1F" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- BELT -->
  <!-- rollers -->
  <circle cx="80" cy="200" r="20" fill="#EFEBE4" stroke="#0F1115" stroke-width="1.5"/>
  <circle cx="80" cy="200" r="4" fill="#0F1115"/>
  <circle cx="470" cy="200" r="20" fill="#EFEBE4" stroke="#0F1115" stroke-width="1.5"/>
  <circle cx="470" cy="200" r="4" fill="#0F1115"/>
  <!-- belt surfaces -->
  <line x1="80" y1="180" x2="470" y2="180" stroke="#0F1115" stroke-width="1.5"/>
  <line x1="80" y1="220" x2="470" y2="220" stroke="#0F1115" stroke-width="1.5"/>

  <!-- Sample on belt (centered under camera) -->
  <rect x="245" y="161" width="60" height="19" fill="#EFEBE4" stroke="#0F1115" stroke-width="1.5"/>
  <!-- subtle fabric/PCB texture inside -->
  <line x1="252" y1="165" x2="252" y2="176" stroke="#0F1115" stroke-width="0.6"/>
  <line x1="262" y1="165" x2="262" y2="176" stroke="#0F1115" stroke-width="0.6"/>
  <line x1="272" y1="165" x2="272" y2="176" stroke="#0F1115" stroke-width="0.6"/>
  <line x1="282" y1="165" x2="282" y2="176" stroke="#0F1115" stroke-width="0.6"/>
  <line x1="292" y1="165" x2="292" y2="176" stroke="#0F1115" stroke-width="0.6"/>

  <!-- belt direction arrow -->
  <line x1="345" y1="200" x2="395" y2="200" stroke="#0F1115" stroke-width="1"/>
  <polyline points="388,196 395,200 388,204" fill="none" stroke="#0F1115" stroke-width="1"/>

  <!-- belt label -->
  <text x="180" y="252" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#7A7B7F">your conveyor · we don't replace this</text>

  <!-- EDGE BOX -->
  <rect x="540" y="118" width="140" height="86" fill="#EFEBE4" stroke="#0F1115" stroke-width="1.5"/>
  <!-- header strip -->
  <line x1="540" y1="138" x2="680" y2="138" stroke="#0F1115" stroke-width="0.8"/>
  <text x="548" y="133" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#0F1115">JETSON-ORIN</text>
  <!-- internals: SoC chip + RAM rectangles -->
  <rect x="554" y="150" width="34" height="26" fill="#EFEBE4" stroke="#0F1115" stroke-width="1"/>
  <text x="558" y="166" font-family="JetBrains Mono, ui-monospace, monospace" font-size="7" fill="#7A7B7F">SoC</text>
  <rect x="598" y="150" width="68" height="12" fill="#EFEBE4" stroke="#0F1115" stroke-width="1"/>
  <rect x="598" y="166" width="68" height="10" fill="#EFEBE4" stroke="#0F1115" stroke-width="1"/>
  <!-- ports row -->
  <rect x="554" y="186" width="14" height="10" fill="none" stroke="#0F1115" stroke-width="0.8"/>
  <rect x="572" y="186" width="14" height="10" fill="none" stroke="#0F1115" stroke-width="0.8"/>
  <rect x="590" y="186" width="14" height="10" fill="none" stroke="#0F1115" stroke-width="0.8"/>
  <!-- live LED -->
  <circle cx="665" cy="128" r="3" fill="#FF5A1F"/>
  <!-- box label -->
  <text x="540" y="110" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#0F1115">edge box · NVIDIA Jetson Orin</text>

  <!-- Cable: camera → edge box (arc above) -->
  <path d="M 260 76 C 380 30, 480 30, 575 118" fill="none" stroke="#0F1115" stroke-width="1.5"/>
  <text x="378" y="38" font-family="JetBrains Mono, ui-monospace, monospace" font-size="9" fill="#7A7B7F">USB 3</text>

  <!-- Output arrow + label -->
  <line x1="680" y1="160" x2="708" y2="160" stroke="#0F1115" stroke-width="1.5"/>
  <polyline points="701,156 708,160 701,164" fill="none" stroke="#0F1115" stroke-width="1.5"/>
  <text x="540" y="230" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#7A7B7F">PASS / FAIL · on-device</text>
  <text x="540" y="246" font-family="JetBrains Mono, ui-monospace, monospace" font-size="10" fill="#7A7B7F">30 ms latency</text>

</svg>
